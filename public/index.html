<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Totally Rad 80's Trivia — Online</title>
<style>
  :root {
    --neon-pink: #ff2e88;
    --neon-cyan: #05d9e8;
    --neon-purple: #b537f2;
    --neon-yellow: #f9f002;
    --dark: #0d0221;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Courier New', monospace;
    background: var(--dark);
    background-image:
      linear-gradient(rgba(181, 55, 242, 0.15) 1px, transparent 1px),
      linear-gradient(90deg, rgba(181, 55, 242, 0.15) 1px, transparent 1px);
    background-size: 40px 40px;
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow-x: hidden;
  }
  body::after {
    content: ""; position: fixed; bottom: 0; left: 0; right: 0; height: 40vh;
    background: linear-gradient(to top, rgba(255, 46, 136, 0.25), transparent);
    pointer-events: none; z-index: 0;
  }
  .game {
    position: relative; z-index: 1; width: 100%; max-width: 640px;
    background: rgba(26, 11, 61, 0.85);
    border: 2px solid var(--neon-cyan); border-radius: 12px;
    box-shadow: 0 0 20px var(--neon-cyan), inset 0 0 30px rgba(5, 217, 232, 0.1);
    padding: 32px;
  }
  @media (max-width: 480px) { .game { padding: 22px 16px; } }
  h1 {
    text-align: center; font-size: clamp(1.6rem, 5.5vw, 2.6rem); line-height: 1.1;
    letter-spacing: 2px; text-transform: uppercase; color: var(--neon-yellow);
    text-shadow: 0 0 8px var(--neon-pink), 3px 3px 0 var(--neon-pink), 6px 6px 0 var(--neon-purple);
    margin-bottom: 6px;
  }
  .subtitle {
    text-align: center; color: var(--neon-cyan); letter-spacing: 4px;
    font-size: 0.75rem; margin-bottom: 24px; text-transform: uppercase;
  }
  .screen { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  p.lead { text-align: center; line-height: 1.6; margin-bottom: 20px; color: #d8c7ff; }

  button { font-family: inherit; cursor: pointer; border: none; transition: all 0.15s ease; }
  .btn-primary {
    display: block; width: 100%; background: var(--neon-pink); color: #fff;
    font-size: 1.05rem; font-weight: bold; text-transform: uppercase; letter-spacing: 2px;
    padding: 15px; border-radius: 8px; box-shadow: 0 0 12px var(--neon-pink); margin-top: 8px;
  }
  .btn-primary:hover:not(:disabled) { background: var(--neon-purple); box-shadow: 0 0 18px var(--neon-purple); transform: translateY(-2px); }
  .btn-primary:disabled { opacity: 0.45; cursor: default; }
  .btn-start { font-size: 1.35rem; padding: 20px; border-radius: 12px; margin-top: 14px; }
  .btn-ghost {
    display: block; width: 100%; background: transparent; color: var(--neon-cyan);
    border: 2px solid var(--neon-cyan); font-size: 1rem; text-transform: uppercase; letter-spacing: 2px;
    padding: 13px; border-radius: 8px; margin-top: 8px;
  }
  .btn-ghost:hover { background: rgba(5,217,232,0.12); }
  .btn-link {
    display: inline-block; background: none; color: #8a7db8; font-size: 0.8rem;
    letter-spacing: 1px; text-transform: uppercase; text-decoration: underline; padding: 12px 6px;
  }
  .btn-link:hover { color: var(--neon-pink); }

  input.field {
    font-family: inherit; font-size: 1rem; width: 100%; padding: 13px 15px; border-radius: 8px;
    border: 2px solid var(--neon-cyan); background: rgba(5, 217, 232, 0.08); color: #fff; margin-bottom: 10px;
  }
  input.field:focus { outline: none; border-color: var(--neon-pink); box-shadow: 0 0 10px var(--neon-pink); }
  input.field::placeholder { color: #9a8fc0; }

  /* ===================== IDENTITY CARD (who are you) ===================== */
  .id-card {
    background: rgba(181, 55, 242, 0.12); border: 1px solid var(--neon-purple);
    border-radius: 14px; padding: 14px; margin-bottom: 20px;
  }
  .id-label { text-align: center; text-transform: uppercase; letter-spacing: 3px;
    font-size: 0.72rem; color: var(--neon-cyan); margin-bottom: 10px; }
  .id-row { display: flex; gap: 10px; justify-content: center; align-items: stretch; }
  .id-avatar {
    flex: 0 0 64px; height: 64px; font-size: 2.1rem; line-height: 1;
    border-radius: 12px; background: rgba(5, 217, 232, 0.1);
    border: 2px solid var(--neon-cyan); box-shadow: 0 0 10px rgba(5,217,232,0.4);
  }
  .id-avatar:hover { transform: scale(1.06); }
  .id-name {
    flex: 1; min-width: 0; height: 64px; font-size: clamp(1.05rem, 4.5vw, 1.35rem); font-weight: bold;
    letter-spacing: 1px; color: #fff; background: transparent;
    border: 2px dashed rgba(255,255,255,0.3); border-radius: 12px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 0 8px;
  }
  .id-name:hover { border-color: var(--neon-pink); }
  .id-dice {
    flex: 0 0 64px; height: 64px; font-size: 1.9rem; line-height: 1;
    border-radius: 12px; background: rgba(249, 240, 2, 0.1);
    border: 2px solid var(--neon-yellow); box-shadow: 0 0 10px rgba(249,240,2,0.3);
  }
  .id-dice:hover { transform: scale(1.06) rotate(12deg); }
  .id-dice.rolling { animation: roll 0.45s ease; }
  @keyframes roll { 50% { transform: rotate(360deg) scale(1.25); } }
  .id-hint { text-align: center; color: #9a8fc0; font-size: 0.72rem; letter-spacing: 1px; margin-top: 9px; }
  input.name-edit { font-size: 1.25rem; text-align: center; letter-spacing: 1px;
    height: 64px; margin-bottom: 0; border-color: var(--neon-pink); }
  .avatar-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-top: 12px; }
  .avatar-grid button {
    font-size: 1.7rem; line-height: 1; min-height: 52px; border-radius: 10px;
    background: rgba(5, 217, 232, 0.08); border: 2px solid transparent;
  }
  .avatar-grid button:hover { background: rgba(5, 217, 232, 0.22); transform: scale(1.08); }
  .avatar-grid button.sel { border-color: var(--neon-yellow); box-shadow: 0 0 8px var(--neon-yellow); }

  /* ===================== GIANT CHOICE CARDS ===================== */
  .choice-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .choice {
    min-height: 170px; border-radius: 16px; padding: 18px 8px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 7px;
  }
  .choice .ci { font-size: 3rem; line-height: 1; }
  .choice .ct { font-size: 1.35rem; font-weight: bold; letter-spacing: 3px; text-transform: uppercase; }
  .choice .cs { font-size: 0.74rem; letter-spacing: 1px; text-transform: uppercase; opacity: 0.85; }
  .choice.start {
    background: var(--neon-pink); color: #fff;
    box-shadow: 0 0 18px var(--neon-pink);
  }
  .choice.start .ci { animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 50% { transform: scale(1.18); } }
  .choice.start:hover { background: var(--neon-purple); box-shadow: 0 0 24px var(--neon-purple); transform: translateY(-3px); }
  .choice.join {
    background: rgba(5, 217, 232, 0.08); color: var(--neon-cyan);
    border: 2px solid var(--neon-cyan); box-shadow: 0 0 14px rgba(5, 217, 232, 0.4);
  }
  .choice.join:hover { background: rgba(5, 217, 232, 0.2); transform: translateY(-3px); }
  .choice:active { transform: scale(0.97); }

  /* ===================== ARCADE KEYPAD (join by code) ===================== */
  .kp-prompt { text-align: center; color: var(--neon-yellow); letter-spacing: 2px;
    text-transform: uppercase; font-size: 0.95rem; line-height: 1.6; margin-bottom: 4px; }
  .digits { display: flex; gap: 16px; justify-content: center; margin: 16px 0 20px; }
  .digits.shake { animation: shake 0.3s ease; }
  @keyframes shake { 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
  .digit {
    width: 86px; height: 106px; border: 3px solid rgba(5, 217, 232, 0.5); border-radius: 14px;
    font-size: 3.6rem; font-weight: bold; display: flex; align-items: center; justify-content: center;
    color: var(--neon-yellow); background: rgba(5, 217, 232, 0.07);
    text-shadow: 0 0 12px var(--neon-pink);
  }
  .digit.active { border-color: var(--neon-pink); box-shadow: 0 0 14px rgba(255, 46, 136, 0.6); }
  .digit.active::after { content: "▮"; color: var(--neon-pink); font-size: 2.6rem; animation: blink 1s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  .digit.locked { border-color: #39ff14; box-shadow: 0 0 16px #39ff14; color: #39ff14; text-shadow: 0 0 12px #39ff14; }
  .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 330px; margin: 0 auto; }
  .key {
    min-height: 66px; font-size: 1.8rem; font-weight: bold; border-radius: 12px;
    background: rgba(181, 55, 242, 0.2); border: 2px solid var(--neon-purple); color: #fff;
    box-shadow: 0 0 8px rgba(181, 55, 242, 0.35);
  }
  .key:hover:not(:disabled) { background: rgba(181, 55, 242, 0.45); }
  .key:active:not(:disabled) { transform: scale(0.93); background: var(--neon-pink); border-color: var(--neon-pink); }
  .key.aux { background: transparent; border-color: rgba(255,255,255,0.25); color: #9a8fc0; box-shadow: none; font-size: 1.5rem; }
  .key.ghost { visibility: hidden; }
  .kp-note { text-align: center; min-height: 24px; margin-top: 14px; color: var(--neon-cyan); letter-spacing: 1px; font-size: 0.9rem; }
  .kp-back { display: block; margin: 6px auto 0; }

  .landing-note { text-align: center; min-height: 20px; margin-top: 14px; color: var(--neon-cyan); letter-spacing: 1px; font-size: 0.85rem; }

  /* room banner (shown during play so people can join any time) */
  .roombar {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    background: rgba(181,55,242,0.15); border: 1px solid var(--neon-purple);
    border-radius: 8px; padding: 8px 12px; margin-bottom: 16px; font-size: 0.8rem; letter-spacing: 1px;
  }
  .roombar .rb-code { color: var(--neon-yellow); font-size: 1.1rem; font-weight: bold; letter-spacing: 3px; }
  .roombar .rb-actions { display: flex; gap: 8px; }
  .roombar button {
    background: transparent; color: var(--neon-cyan); border: 1px solid var(--neon-cyan);
    border-radius: 6px; padding: 8px 12px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px;
  }
  .roombar button:hover { background: rgba(5,217,232,0.15); }

  .hud { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;
    font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
  .hud .qcount { color: var(--neon-cyan); }
  .hud .answered { color: var(--neon-yellow); }

  .category-tag { display: inline-block; background: var(--neon-purple); color: #fff; font-size: 0.7rem;
    letter-spacing: 1px; text-transform: uppercase; padding: 4px 10px; border-radius: 20px; margin-bottom: 14px; }

  .question { font-size: 1.2rem; line-height: 1.5; margin-bottom: 22px; }

  .answers { display: grid; gap: 12px; }
  .answer {
    text-align: left; background: rgba(5, 217, 232, 0.08); border: 2px solid var(--neon-cyan);
    color: #fff; font-size: 1rem; padding: 14px 18px; border-radius: 8px; display: flex; align-items: center; gap: 12px;
    min-height: 52px;
  }
  .answer:hover:not(:disabled) { background: rgba(5, 217, 232, 0.25); transform: translateX(4px); }
  .answer .letter { font-weight: bold; color: var(--neon-yellow); flex-shrink: 0; }
  .answer:disabled { cursor: default; }
  .answer.correct { background: rgba(57, 255, 20, 0.2); border-color: #39ff14; box-shadow: 0 0 12px #39ff14; }
  .answer.wrong { background: rgba(255, 46, 136, 0.2); border-color: var(--neon-pink); box-shadow: 0 0 12px var(--neon-pink); }
  .answer.picked { outline: 2px dashed var(--neon-yellow); outline-offset: 2px; }
  .answer.dim { opacity: 0.4; }
  .answer { position: relative; overflow: hidden; }
  .answer .fill { position: absolute; left: 0; top: 0; bottom: 0; width: 0;
    background: rgba(255, 46, 136, 0.22); z-index: 0; transition: width 0.6s cubic-bezier(.2,.8,.2,1); }
  .answer .fill.fill-correct { background: rgba(57, 255, 20, 0.28); }
  .answer .letter, .answer .qa, .answer .pct { position: relative; z-index: 1; }
  .answer .qa { flex: 1; }
  .answer .pct { font-weight: bold; font-size: 0.82rem; letter-spacing: 1px; color: #fff; white-space: nowrap; }

  .rank-num { color: var(--neon-cyan); min-width: 24px; display: inline-block; }

  .note { text-align: center; margin-top: 18px; min-height: 22px; font-size: 0.95rem; letter-spacing: 1px; color: var(--neon-cyan); }

  /* ===================== LOBBY ===================== */
  .roomcode-label { text-align: center; text-transform: uppercase; letter-spacing: 3px;
    font-size: 0.78rem; color: var(--neon-cyan); margin-bottom: 2px; }
  .roomcode {
    text-align: center; font-size: clamp(4.5rem, 24vw, 7rem); line-height: 1.1; font-weight: bold;
    letter-spacing: 18px; padding-left: 18px; color: var(--neon-yellow);
    text-shadow: 0 0 18px var(--neon-pink), 0 0 40px var(--neon-pink);
    animation: codeglow 2.2s ease-in-out infinite;
  }
  @keyframes codeglow {
    50% { text-shadow: 0 0 28px var(--neon-pink), 0 0 60px var(--neon-purple); }
  }
  .roomcode-hint { text-align: center; color: #d8c7ff; font-size: 0.8rem; letter-spacing: 1px; margin-bottom: 14px; }

  .players { display: grid; gap: 8px; margin: 18px 0; }
  .player-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px;
    border-radius: 8px; background: rgba(5,217,232,0.08); border: 1px solid rgba(255,255,255,0.15); letter-spacing: 1px; }
  .player-row.me { border-color: var(--neon-pink); box-shadow: 0 0 8px rgba(255,46,136,0.5); }
  .player-row.offline { opacity: 0.45; }
  .player-row .pts { color: var(--neon-yellow); font-weight: bold; }
  .badge { font-size: 0.65rem; background: var(--neon-purple); padding: 2px 7px; border-radius: 10px; margin-left: 8px; letter-spacing: 1px; }

  .id-mini { text-align: center; margin-bottom: 4px; }
  .id-chip {
    background: rgba(255, 46, 136, 0.12); border: 1px dashed var(--neon-pink); color: #fff;
    border-radius: 10px; padding: 10px 16px; font-size: 1rem; letter-spacing: 1px; min-height: 48px;
  }
  .id-chip:hover { background: rgba(255, 46, 136, 0.25); }
  .id-chip .edit-hint { color: var(--neon-cyan); font-size: 0.72rem; text-transform: uppercase; margin-left: 8px; }
  .id-editor { margin: 10px 0 4px; padding: 12px; border: 1px solid var(--neon-purple);
    border-radius: 12px; background: rgba(181, 55, 242, 0.1); }

  .stepper { display: flex; align-items: center; justify-content: center; gap: 18px; margin: 10px 0 4px; }
  .stepper button { width: 56px; height: 56px; border-radius: 12px; background: var(--neon-purple); color: #fff;
    font-size: 1.7rem; font-weight: bold; box-shadow: 0 0 10px var(--neon-purple); }
  .stepper button:hover { background: var(--neon-pink); }
  .stepper .value { font-size: 2rem; color: var(--neon-yellow); min-width: 56px; text-align: center; }
  .setup-label { text-transform: uppercase; letter-spacing: 2px; font-size: 0.75rem; color: var(--neon-cyan); text-align: center; }

  .leaderboard { display: grid; gap: 10px; margin-bottom: 20px; }
  .lb-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px;
    border-radius: 8px; background: rgba(5, 217, 232, 0.08); border: 2px solid var(--neon-cyan); }
  .lb-row.winner { border-color: var(--neon-yellow); box-shadow: 0 0 14px var(--neon-yellow); }
  .lb-row.me { border-color: var(--neon-pink); }
  .lb-row .lb-pts { color: var(--neon-yellow); font-weight: bold; }

  .prog { color: var(--neon-cyan); font-size: 0.75rem; margin-left: 6px; letter-spacing: 1px; }
  .prog.done { color: #39ff14; }

  .conn { position: fixed; top: 10px; right: 14px; z-index: 5; font-size: 0.7rem; letter-spacing: 1px;
    text-transform: uppercase; color: #6f6396; }
  .conn.online { color: #39ff14; }
  .conn.offline { color: var(--neon-pink); }

  .version { position: absolute; right: 2px; bottom: -20px; font-size: 0.7rem;
    color: #6f6396; letter-spacing: 1px; }

  .results-title { text-align: center; font-size: 1.5rem; color: var(--neon-cyan); text-transform: uppercase;
    letter-spacing: 2px; margin-bottom: 20px; }
</style>
</head>
<body>
<div class="conn" id="conn">● offline</div>
<div class="game">
  <h1>80's Trivia</h1>
  <div class="subtitle">★ Online · Self-Paced ★</div>

  <!-- LANDING -->
  <div id="landing" class="screen">
    <!-- who are you: zero typing required -->
    <div class="id-card">
      <div class="id-label">★ You Are ★</div>
      <div class="id-row" id="idRow">
        <button class="id-avatar" id="avatarBtn" onclick="toggleAvatars()" aria-label="Change your face">👾</button>
        <button class="id-name" id="nameBtn" onclick="editName()" aria-label="Change your name">Rad Max</button>
        <button class="id-dice" id="diceBtn" onclick="shuffleIdentity()" aria-label="Random new name">🎲</button>
      </div>
      <input class="field name-edit" id="nameInput" type="text" maxlength="13" style="display:none" aria-label="Type your name">
      <div class="avatar-grid" id="avatarGrid" style="display:none"></div>
      <div class="id-hint">tap the face · tap the name · or roll the dice</div>
    </div>

    <!-- the big choice -->
    <div class="choice-cards" id="choiceCards">
      <button class="choice start" onclick="newGame()">
        <span class="ci">🚀</span>
        <span class="ct">Start</span>
        <span class="cs">a new game</span>
      </button>
      <button class="choice join" onclick="showKeypad()">
        <span class="ci">🔢</span>
        <span class="ct">Join</span>
        <span class="cs">got a code?</span>
      </button>
    </div>

    <!-- arcade keypad (revealed by JOIN) -->
    <div id="keypadPanel" style="display:none">
      <div class="kp-prompt">What room? Punch it in!</div>
      <div class="digits" id="digits">
        <span class="digit" id="digit0"></span>
        <span class="digit" id="digit1"></span>
      </div>
      <div class="keypad" id="keypad"></div>
      <div class="kp-note" id="kpNote"></div>
      <button class="btn-link kp-back" onclick="hideKeypad()">← back</button>
    </div>

    <div class="landing-note" id="landingNote"></div>
  </div>

  <!-- LOBBY (gather + share code; any player can start) -->
  <div id="lobby" class="screen" style="display:none;">
    <div class="roomcode-label">Your Room Number</div>
    <div class="roomcode" id="roomCode">--</div>
    <div class="roomcode-hint">📣 Shout it out — friends tap JOIN and punch it in</div>
    <button class="btn-ghost" id="copyBtn" onclick="copyInvite(event)" style="margin-bottom:6px;">Copy Invite Link 🔗</button>

    <div class="players" id="lobbyPlayers"></div>

    <div class="id-mini">
      <button class="id-chip" id="lobbyIdChip" onclick="toggleLobbyIdEditor()">👾 Rad Max <span class="edit-hint">✎ change</span></button>
    </div>
    <div class="id-editor" id="lobbyIdEditor" style="display:none">
      <div class="id-row">
        <button class="id-avatar" id="lobbyAvatarBtn" onclick="toggleLobbyAvatars()" aria-label="Change your face">👾</button>
        <input class="field name-edit" id="lobbyNameInput" type="text" maxlength="13" style="margin-bottom:0" aria-label="Type your name">
        <button class="id-dice" onclick="shuffleIdentity()" aria-label="Random new name">🎲</button>
      </div>
      <div class="avatar-grid" id="lobbyAvatarGrid" style="display:none"></div>
      <button class="btn-ghost" onclick="closeLobbyIdEditor()" style="margin-top:10px;">Done ✓</button>
    </div>

    <div class="setup-label" style="margin-top:14px;">Questions this round</div>
    <div class="stepper">
      <button onclick="changeQPP(-1)" aria-label="Fewer questions">−</button>
      <span class="value" id="qppVal">10</span>
      <button onclick="changeQPP(1)" aria-label="More questions">+</button>
    </div>
    <button class="btn-primary btn-start" id="startBtn" onclick="startGame()">▶ Start Game</button>
    <div class="note" id="lobbyNote"></div>
    <button class="btn-link" onclick="leaveRoom()">← Leave room</button>
  </div>

  <!-- GAME (question + reveal) -->
  <div id="game" class="screen" style="display:none;">
    <div class="roombar">
      <span>ROOM <span class="rb-code" id="gameCode">--</span></span>
      <span class="rb-actions">
        <button onclick="copyInvite(event)" id="gameCopyBtn">Copy Link</button>
      </span>
    </div>
    <div class="hud">
      <span class="qcount" id="qcount">Q 1 / 10</span>
      <span class="answered" id="answeredCount"></span>
    </div>
    <span class="category-tag" id="catTag">Movies</span>
    <div class="question" id="questionText"></div>
    <div class="answers" id="answers"></div>
    <div class="note" id="gameNote"></div>
    <div class="players" id="gamePlayers" style="margin-top:18px;"></div>
    <div id="gameNextControls"></div>
  </div>

  <!-- GAME OVER -->
  <div id="over" class="screen" style="display:none;">
    <div class="roombar">
      <span>ROOM <span class="rb-code" id="overCode">--</span></span>
      <span class="rb-actions">
        <button onclick="copyInvite(event)">Copy Link</button>
      </span>
    </div>
    <div class="results-title" id="overTitle">Game Over</div>
    <div class="leaderboard" id="leaderboard"></div>
    <button class="btn-primary" onclick="newGameAgain()">New Game ↻</button>
    <div class="note" id="overNote"></div>
    <button class="btn-link" onclick="leaveRoom()">← Leave room</button>
  </div>

  <div class="version" id="version">v9</div>
</div>

<script type="module">
import PartySocket from "https://esm.sh/partysocket@1.0.2";

const $ = id => document.getElementById(id);
const LETTERS = ["A", "B", "C", "D"];

// ---- stable identity (survives refresh, reconnect, dropped phone) ----
const LS = window.localStorage;
function ensureCid() {
  let c = LS.getItem("trivia.cid");
  if (!c) {
    c = (crypto.randomUUID ? crypto.randomUUID() : String(Math.random()).slice(2) + Date.now());
    LS.setItem("trivia.cid", c);
  }
  return c;
}
const myCid = ensureCid();

// ---- fun identity: avatar + 80s name, zero typing required ----
// (Avatars are single-codepoint emoji so name+avatar stays short on the wire.)
const AVATARS = ["👾","🤖","🚀","🛹","📼","🎸","🎧","🌈","⚡","🍕","🦄","🐱","🔥","💾","🐸","🍩","🌴","👽"];
const NAMES = ["Rad Max","Neon Nikki","Turbo Ted","Laser Lou","Disco Dee","Pixel Pam","Synth Sam","Rocker Rex","Cosmic Kim","Boombox Bo","Mixtape Mo","Arcade Ace","Roller Roz","Vinyl Vic","Glitter Gus","Hot Rod Hal","Jazzy Jay","Big Kahuna"];
const pick = arr => arr[Math.floor(Math.random() * arr.length)];

let myAvatar = LS.getItem("trivia.avatar") || "";
let myName = (LS.getItem("trivia.name") || "").trim().slice(0, 13);
if (!AVATARS.includes(myAvatar)) myAvatar = pick(AVATARS);
if (!myName || myName === "Player") myName = pick(NAMES);

function fullName() { return `${myAvatar} ${myName}`; }

function refreshIdentityUI() {
  $("avatarBtn").textContent = myAvatar;
  $("nameBtn").textContent = myName;
  $("lobbyAvatarBtn").textContent = myAvatar;
  if (document.activeElement !== $("lobbyNameInput")) $("lobbyNameInput").value = myName;
  $("lobbyIdChip").innerHTML = `${myAvatar} ${escapeHtml(myName)} <span class="edit-hint">✎ change</span>`;
}

function saveIdentity() {
  LS.setItem("trivia.name", myName);
  LS.setItem("trivia.avatar", myAvatar);
  refreshIdentityUI();
  // Already in a room? Tell everyone the new look right away.
  try { if (socket && roomCode) socket.send(JSON.stringify({ type: "join", cid: myCid, name: fullName() })); } catch {}
}

function buildAvatarGrid(el) {
  el.innerHTML = "";
  AVATARS.forEach(a => {
    const b = document.createElement("button");
    b.type = "button";
    b.textContent = a;
    if (a === myAvatar) b.classList.add("sel");
    b.setAttribute("aria-label", "Pick face " + a);
    b.onclick = () => { myAvatar = a; saveIdentity(); el.style.display = "none"; };
    el.appendChild(b);
  });
}

window.toggleAvatars = () => {
  const g = $("avatarGrid");
  const opening = g.style.display === "none";
  if (opening) buildAvatarGrid(g);
  g.style.display = opening ? "grid" : "none";
};
window.toggleLobbyAvatars = () => {
  const g = $("lobbyAvatarGrid");
  const opening = g.style.display === "none";
  if (opening) buildAvatarGrid(g);
  g.style.display = opening ? "grid" : "none";
};

window.shuffleIdentity = () => {
  let a = pick(AVATARS), n = pick(NAMES);
  if (a === myAvatar) a = AVATARS[(AVATARS.indexOf(a) + 1) % AVATARS.length];
  if (n === myName) n = NAMES[(NAMES.indexOf(n) + 1) % NAMES.length];
  myAvatar = a; myName = n;
  saveIdentity();
  const d = $("diceBtn");
  d.classList.remove("rolling"); void d.offsetWidth; d.classList.add("rolling");
};

window.editName = () => {
  $("nameInput").value = myName;
  $("nameInput").style.display = "block";
  $("nameBtn").style.display = "none";
  $("nameInput").focus();
  $("nameInput").select();
};
function commitName(fromEl) {
  const v = fromEl.value.trim().slice(0, 13);
  if (v) { myName = v; saveIdentity(); }
  else refreshIdentityUI();
}
$("nameInput").addEventListener("blur", () => {
  commitName($("nameInput"));
  $("nameInput").style.display = "none";
  $("nameBtn").style.display = "";
});
$("nameInput").addEventListener("keydown", e => { if (e.key === "Enter") $("nameInput").blur(); });
$("lobbyNameInput").addEventListener("blur", () => commitName($("lobbyNameInput")));
$("lobbyNameInput").addEventListener("keydown", e => { if (e.key === "Enter") $("lobbyNameInput").blur(); });

window.toggleLobbyIdEditor = () => {
  const ed = $("lobbyIdEditor");
  const opening = ed.style.display === "none";
  ed.style.display = opening ? "block" : "none";
  if (opening) $("lobbyNameInput").value = myName;
};
window.closeLobbyIdEditor = () => {
  commitName($("lobbyNameInput"));
  $("lobbyIdEditor").style.display = "none";
  $("lobbyAvatarGrid").style.display = "none";
};

let socket = null;
let myId = null;         // === myCid once joined; used for "me" highlighting
let myChoice = null;     // my pick for the current question (local echo)
let lastIndex = -1;
let lastSig = "";        // signature of MY question view; skip rebuild when unchanged
let currentScreen = null;
let qpp = 10;
let state = null;
let roomCode = "";

// ---- connection ----
function randomCode() {
  return String(Math.floor(Math.random() * 90) + 10);  // 10–99, always two digits
}

function setConn(status) {
  const el = $("conn");
  el.className = "conn " + status;
  el.textContent = status === "online" ? "● connected" : "● reconnecting…";
}

function connect(code) {
  roomCode = String(code);
  myChoice = null; lastIndex = -1; lastSig = ""; state = null;
  LS.setItem("trivia.room", roomCode);
  $("roomCode").textContent = roomCode;  // paint instantly; render() confirms on first state
  saveIdentity();
  if (socket) { try { socket.close(); } catch {} }
  socket = new PartySocket({ host: location.host, room: roomCode });
  socket.addEventListener("open", () => {
    setConn("online");
    socket.send(JSON.stringify({ type: "join", cid: myCid, name: fullName() }));
  });
  socket.addEventListener("close", () => setConn("offline"));
  socket.addEventListener("error", () => setConn("offline"));
  socket.addEventListener("message", (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === "welcome") return;
    if (msg.type === "state") { state = msg; render(); }
  });
}

// ---- landing actions ----
window.newGame = () => {
  connect(randomCode());
  showScreen("lobby");
};

// ---- arcade keypad: hear "room 44", punch 4-4, you're in ----
let kp = "";
let kpJoining = false;

function buildKeypad() {
  const el = $("keypad");
  el.innerHTML = "";
  ["1","2","3","4","5","6","7","8","9","del","0","ghost"].forEach(k => {
    const b = document.createElement("button");
    b.type = "button";
    if (k === "ghost") { b.className = "key ghost"; b.disabled = true; b.innerHTML = "&nbsp;"; }
    else if (k === "del") { b.className = "key aux"; b.textContent = "⌫"; b.setAttribute("aria-label", "Delete digit"); b.onclick = kpDel; }
    else { b.className = "key"; b.textContent = k; b.setAttribute("aria-label", "Digit " + k); b.onclick = () => kpPress(k); }
    el.appendChild(b);
  });
}

function kpRender() {
  ["digit0", "digit1"].forEach((id, i) => {
    const el = $(id);
    el.textContent = kp[i] || "";
    el.classList.toggle("active", !kpJoining && kp.length === i);
    el.classList.toggle("locked", kpJoining);
  });
}

function kpPress(d) {
  if (kpJoining || kp.length >= 2) return;
  if (kp.length === 0 && d === "0") {  // room codes are 10–99; a leading 0 can't be right
    const dg = $("digits");
    dg.classList.remove("shake"); void dg.offsetWidth; dg.classList.add("shake");
    $("kpNote").textContent = "Codes start with 1–9!";
    return;
  }
  kp += d;
  kpRender();
  if (kp.length === 2) {
    kpJoining = true;
    kpRender();
    $("kpNote").textContent = `🕹 Joining room ${kp}…`;
    const code = kp;
    setTimeout(() => {
      kp = ""; kpJoining = false;
      connect(code);
      showScreen("lobby");
      hideKeypad();
    }, 400);
  } else {
    $("kpNote").textContent = "One more digit…";
  }
}

function kpDel() {
  if (kpJoining) return;
  kp = kp.slice(0, -1);
  $("kpNote").textContent = "";
  kpRender();
}

window.showKeypad = () => {
  kp = ""; kpJoining = false;
  $("kpNote").textContent = "";
  $("choiceCards").style.display = "none";
  $("keypadPanel").style.display = "block";
  kpRender();
};
window.hideKeypad = () => {
  kp = ""; kpJoining = false;
  $("keypadPanel").style.display = "none";
  $("choiceCards").style.display = "grid";
};

// Desktop / hardware keyboard works on the keypad too.
document.addEventListener("keydown", (e) => {
  if ($("keypadPanel").style.display === "none") return;
  if (document.activeElement && document.activeElement.tagName === "INPUT") return;
  if (/^[0-9]$/.test(e.key)) kpPress(e.key);
  else if (e.key === "Backspace") kpDel();
  else if (e.key === "Escape") window.hideKeypad();
});

window.leaveRoom = () => {
  socket?.send(JSON.stringify({ type: "leave" }));
  try { socket?.close(); } catch {}
  socket = null; state = null; roomCode = ""; currentScreen = null;
  LS.removeItem("trivia.room");
  window.hideKeypad();
  $("landingNote").textContent = "";
  showScreen("landing");
};

function legacyCopy(text) {
  try {
    const ta = document.createElement("textarea");
    ta.value = text; ta.style.position = "fixed"; ta.style.top = "0"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.focus(); ta.select();
    const ok = document.execCommand("copy");
    document.body.removeChild(ta);
    return ok;
  } catch { return false; }
}

window.copyInvite = async (ev) => {
  if (!roomCode) return;
  const url = `${location.origin}${location.pathname}?room=${roomCode}`;
  let ok = false;
  try {
    if (navigator.clipboard && window.isSecureContext) { await navigator.clipboard.writeText(url); ok = true; }
  } catch { /* fall through */ }
  if (!ok) ok = legacyCopy(url);
  const btn = ev && ev.currentTarget ? ev.currentTarget : $("copyBtn");
  if (btn) {
    const orig = btn.textContent;
    btn.textContent = ok ? "Copied! ✓" : "Copy failed";
    setTimeout(() => { btn.textContent = orig; }, 1500);
  }
  if (!ok) prompt("Copy this invite link:", url);
};

window.changeQPP = (d) => { qpp = Math.min(20, Math.max(3, qpp + d)); $("qppVal").textContent = qpp; };
window.startGame = () => socket?.send(JSON.stringify({ type: "newgame", n: qpp }));
window.newGameAgain = () => socket?.send(JSON.stringify({ type: "newgame", n: qpp }));
window.sendAnswer = (choice) => {
  if (myChoice !== null || (state && state.answered)) return;
  myChoice = choice;
  socket?.send(JSON.stringify({ type: "answer", choice }));
  render(); // optimistic "locked in" highlight until the server echoes the reveal
};
window.myNext = () => socket?.send(JSON.stringify({ type: "next" }));   // advances ONLY me

// ---- rendering ----
function showScreen(id) {
  if (currentScreen === id) return;
  currentScreen = id;
  ["landing", "lobby", "game", "over"].forEach(s => $(s).style.display = s === id ? "block" : "none");
}

function render() {
  if (!state) return;
  myId = state.myId || myCid;

  if (state.myIndex !== lastIndex) { myChoice = null; lastIndex = state.myIndex; }

  if (state.phase === "lobby") {
    showScreen("lobby");
    renderLobby();
    lastSig = "";
    return;
  }
  if (state.done) {
    showScreen("over");
    renderOver();
    lastSig = "";
    return;
  }

  // Playing. Only rebuild MY question/answers when my own view changed.
  showScreen("game");
  $("gameCode").textContent = roomCode;
  const sig = `${state.myIndex}|${state.answered}|${myChoice}|${state.question ? state.question.q : ""}`;
  if (sig !== lastSig) { lastSig = sig; renderQuestionArea(); }
  $("gamePlayers").innerHTML = scoreboardHTML();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function lobbyRow(p) {
  const me = p.id === myId ? '<span class="badge">YOU</span>' : "";
  const dot = p.online ? "" : '<span class="badge" style="background:#444;">AWAY</span>';
  return `<div class="player-row ${p.id === myId ? "me" : ""} ${p.online ? "" : "offline"}">
            <span>${escapeHtml(p.name)}${me}${dot}</span><span></span>
          </div>`;
}

function renderLobby() {
  roomCode = roomCode || "--";
  $("roomCode").textContent = roomCode;
  $("qppVal").textContent = qpp;
  $("lobbyPlayers").innerHTML = state.players.map(lobbyRow).join("");
  const others = state.players.filter(p => p.online).length;
  $("lobbyNote").textContent = others < 2
    ? "Anyone can press Start — friends can join any time."
    : `${others} players in. Anyone can press Start — late-comers can still join.`;
}

function renderQuestionArea() {
  const reveal = state.answered;
  $("qcount").textContent = `Q ${state.myIndex + 1} / ${state.total}`;
  const doneCount = state.players.filter(p => p.done).length;
  $("answeredCount").textContent = doneCount ? `${doneCount}/${state.players.length} finished` : "";
  $("catTag").textContent = state.question.cat;
  $("questionText").textContent = state.question.q;

  const myReveal = (state.myChoice !== null && state.myChoice !== undefined) ? state.myChoice : myChoice;

  const answersEl = $("answers");
  answersEl.innerHTML = "";
  const totalAnswered = state.answeredCount || 0;
  const pcts = [];
  state.question.a.forEach((text, i) => {
    const btn = document.createElement("button");
    btn.className = "answer";
    const label = `<span class="letter">${LETTERS[i]}</span><span class="qa">${escapeHtml(text)}</span>`;
    if (reveal) {
      const n = state.tally ? state.tally[i] : 0;
      const pct = totalAnswered ? Math.round((n / totalAnswered) * 100) : 0;
      pcts.push(pct);
      btn.disabled = true;
      if (i === state.correct) btn.classList.add("correct");
      else if (i === myReveal) btn.classList.add("wrong");
      else btn.classList.add("dim");
      btn.innerHTML = `<div class="fill ${i === state.correct ? "fill-correct" : ""}" style="width:0"></div>` +
                      label + `<span class="pct">${pct}% · ${n}</span>`;
    } else if (myChoice !== null) {
      btn.disabled = true;
      btn.classList.add(i === myChoice ? "picked" : "dim");
      btn.innerHTML = label;
    } else {
      btn.innerHTML = label;
      btn.onclick = () => window.sendAnswer(i);
    }
    answersEl.appendChild(btn);
  });
  if (reveal) {
    requestAnimationFrame(() => {
      answersEl.querySelectorAll(".fill").forEach((f, i) => { f.style.width = pcts[i] + "%"; });
    });
  }

  if (reveal) {
    $("gameNote").textContent = state.iCorrect ? "✔ RAD! +100" : "✗ Bogus!";
    $("gameNote").style.color = state.iCorrect ? "#39ff14" : "var(--neon-pink)";
  } else if (myChoice !== null) {
    $("gameNote").textContent = "✓ Locked in…";
    $("gameNote").style.color = "var(--neon-cyan)";
  } else {
    $("gameNote").textContent = "Pick your answer!";
    $("gameNote").style.color = "var(--neon-cyan)";
  }

  const ctrl = $("gameNextControls");
  if (reveal) {
    const last = state.myIndex + 1 >= state.total;
    ctrl.innerHTML = `<button class="btn-primary" onclick="myNext()">${last ? "Finish ▶" : "Next ▶"}</button>`;
  } else {
    ctrl.innerHTML = "";
  }
}

function scoreboardHTML() {
  const sorted = state.players.slice().sort((a, b) => (b.score - a.score) || (b.progress - a.progress));
  return sorted.map((p, i) => {
    const you = p.id === myId ? '<span class="badge">YOU</span>' : "";
    const away = p.online ? "" : '<span class="badge" style="background:#444;">AWAY</span>';
    const status = p.done ? '<span class="prog done">✓ done</span>' : `<span class="prog">${p.progress}/${state.total}</span>`;
    return `<div class="player-row ${p.id === myId ? "me" : ""} ${p.online ? "" : "offline"}">
              <span><span class="rank-num">${i + 1}.</span>${escapeHtml(p.name)}${you}${away}</span>
              <span><span class="pts">${p.score}</span> ${status}</span>
            </div>`;
  }).join("");
}

function renderOver() {
  $("overCode").textContent = roomCode;
  const allDone = state.players.length > 0 && state.players.every(p => p.done);
  const sorted = state.players.slice().sort((a, b) => b.score - a.score);
  const top = sorted.length ? sorted[0].score : 0;
  const me = sorted.find(p => p.id === myId);

  $("overTitle").textContent = allDone
    ? (sorted.filter(p => p.score === top).length > 1 ? "Final Results — Tie!" : `${sorted[0].name} Wins!`)
    : "You're Done!";

  $("leaderboard").innerHTML = sorted.map((p, rank) => {
    const lead = (p.score === top && allDone) ? "👑 " : `${rank + 1}. `;
    const you = p.id === myId ? '<span class="badge">YOU</span>' : "";
    const status = p.done ? "" : ` <span class="prog">${p.progress}/${state.total}</span>`;
    return `<div class="lb-row ${(p.score === top && allDone) ? "winner" : ""} ${p.id === myId ? "me" : ""}">
              <span>${lead}${escapeHtml(p.name)}${you}${status}</span>
              <span class="lb-pts">${p.score} pts</span>
            </div>`;
  }).join("");

  $("overNote").textContent = allDone
    ? "Hit New Game to play another round — everyone stays in the room."
    : `You scored ${me ? me.score : 0}. Others are still playing — the board updates live!`;
}

// ---- boot ----
refreshIdentityUI();
buildKeypad();
LS.setItem("trivia.name", myName);
LS.setItem("trivia.avatar", myAvatar);

// Auto-rejoin: invite link (?room=NN) or the room we were already in.
const params = new URLSearchParams(location.search);
const urlRoom = params.get("room");
const savedRoom = urlRoom && /^\d{2}$/.test(urlRoom) ? urlRoom : LS.getItem("trivia.room");
if (savedRoom && /^\d{2}$/.test(savedRoom)) {
  $("landingNote").textContent = `🕹 Joining room ${savedRoom}…`;
  connect(savedRoom);
  // render() will move us to the right screen once the first state arrives.
}
</script>
</body>
</html>
